<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container text-center">

    <!-- INTRO -->
    <div class="card-white" id="introduction">

      <h1>Hi, I'm 💎 Your Name 💎</h1>

      <img src="images/profile-picture.png" alt="Profile picture" class="img-circle profile-img">

      <p>
        Welcome to my profile 💗 I love fashion, learning new things and discovering the world ✨
      </p>

      <a href="https://www.google.com" class="btn-pink" target="_blank">
        Discover more 💎
      </a>

    </div>

    <!-- ABOUT -->
    <div class="card-white">
      <h2>About me 💗</h2>
      <p>I am a student who loves creativity, luxury ✨ and motivation 💎</p>
    </div>

    <!-- FOOTER -->
    <div class="card-white">

      <h2>Follow me 💎</h2>

      <ul class="list-inline">
        <li>💗 Instagram</li>
        <li>💎 LinkedIn</li>
        <li>✨ TikTok</li>
      </ul>

    </div>

  </div>

</body>
</html>
